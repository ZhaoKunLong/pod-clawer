<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CCTV 新闻播放器</title>
    <link rel="stylesheet" href="./src/web/styles.css" />
    <link rel="manifest" href="/pod-clawer/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="新闻播放器" />
    <link rel="apple-touch-icon" href="/pod-clawer/icons/icon-192.png" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CCTV</p>
          <h1>新闻播放器</h1>
        </div>
        <a class="refresh" href="./index.html">刷新</a>
      </header>

      <nav class="program-tabs" id="program-tabs" aria-label="节目选择"></nav>

      <section class="panel">
        <h2>近 1 个月节目</h2>
        <div id="episode-list" class="episode-list" aria-live="polite"></div>
      </section>
    </main>
    <script src="./src/web/app.js" type="module"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/pod-clawer/sw.js', { scope: '/pod-clawer/' });
      }
    </script>
  </body>
</html>
