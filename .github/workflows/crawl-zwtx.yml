name: Crawl CCTV 朝闻天下

on:
  schedule:
    - cron: '15 20 * * *'  # = 10:15 AU 08:15 CN
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Crawl latest episode
        run: npm run crawl:zwtx

      - name: Commit metadata updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update 朝闻天下 stream metadata'
          file_pattern: 'data/zwtx/'
